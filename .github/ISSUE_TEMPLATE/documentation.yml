name: Documentation
description: Track documentation updates or missing guidance
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What documentation should change?
    validations:
      required: true
  - type: textarea
    id: affected-docs
    attributes:
      label: Affected Documentation
      description: Link or name the relevant files, pages, or runbooks.
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this documentation work to be complete?
    validations:
      required: true
