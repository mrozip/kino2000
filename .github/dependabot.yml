version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-development:
        dependency-type: "development"
      npm-production:
        dependency-type: "production"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "terraform"
    directory: "/infra/terraform/bootstrap"
    schedule:
      interval: "weekly"
  - package-ecosystem: "terraform"
    directory: "/infra/terraform/environments/dev"
    schedule:
      interval: "weekly"
